<!DOCTYPE html>
<html lang="en" dir="auto" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dans Trading Dashboard</title>
  <style>
    :root {
      --primary: #1e40af;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --bg-light: #f3f4f6;
      --card-bg: #ffffff;
      font-size: 16px;
      font-family: "Segoe UI", Roboto, Helvetica, sans-serif;
    }

    body, html {
      margin: 0; padding: 0; height: 100%;
      background: var(--bg-light);
      display: flex; flex-direction: column;
    }

    header {
      background: var(--primary);
      color: white;
      padding: 12px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .header-left h2 { margin: 0; font-size: 1.1rem; text-transform: uppercase; }
    
    .account-info { display: flex; align-items: center; gap: 8px; }

    .balance-pill {
      background: rgba(255, 255, 255, 0.2);
      padding: 6px 12px;
      border-radius: 50px;
      font-weight: bold;
      font-size: 0.85rem;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .btn-switch {
      background: var(--warning);
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn-logout {
      background: var(--danger);
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: bold;
    }

    .container {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; padding: 20px; gap: 20px;
    }

    .bot-card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 25px;
      width: 100%; max-width: 450px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
      text-align: center;
    }

    .btn-action {
      padding: 15px 20px;
      background: var(--primary);
      color: white;
      border: none; border-radius: 12px;
      font-weight: bold; cursor: pointer;
      margin-top: 15px; width: 100%;
    }

    .trades-log {
      max-width: 450px; width: 100%;
      background: var(--card-bg);
      border-radius: 15px; padding: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .trade-item {
      padding: 10px 0; border-bottom: 1px solid #eee;
      display: flex; justify-content: space-between; font-size: 0.9rem;
    }

    #loader-modal {
      display: none; position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); z-index: 9999;
      justify-content: center; align-items: center; color: white;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h2>Dans Trading</h2>
    <div id="display-id" style="font-size: 0.7rem; opacity: 0.8;">ID: Connecting...</div>
  </div>
  <div class="account-info">
    <div class="balance-pill" id="balance-display">Loading...</div>
    <button class="btn-switch" id="btn-switch" onclick="switchAccount()">Switch</button>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">
  <div class="bot-card">
    <h3 style="margin-top:0; color:var(--primary);">Digit Over Bot v2.0</h3>
    <p style="font-size:0.85rem; color:#666;">Optimized for Volatility 100 (1s)</p>
    
    <div style="text-align:left; margin-bottom:10px;">
        <label style="font-size:0.8rem; font-weight:bold;">Stake Amount:</label>
        <input type="number" id="userStake" value="0.35" step="0.01" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; box-sizing:border-box;">
    </div>

    <button class="btn-action" id="runBtn" onclick="runBot()">Run Bot</button>
  </div>

  <div class="trades-log">
    <h4 style="margin:0 0 15px 0;">Live Trade Log</h4>
    <div id="tradesList" style="font-size:0.8rem; color:#888;">Waiting for first trade...</div>
  </div>
</div>

<div id="loader-modal">
  <div style="text-align:center;">
    <h3>Connecting...</h3>
    <p id="loader-text">Retrieving secure account data</p>
  </div>
</div>

<script>
  const APP_ID = 129457;
  let ws, accountBalance = 0;
  let currentToken = "";

  function logout() {
      localStorage.clear();
      window.location.href = "index.html";
  }

  // Instant Switching Logic
  function switchAccount() {
      const t1 = localStorage.getItem("deriv_token_1");
      const t2 = localStorage.getItem("deriv_token_2");
      
      // Determine the next token to use
      const nextToken = (currentToken === t1) ? t2 : t1;

      if (nextToken) {
          if (ws) ws.close(); // Close current connection before swapping
          document.getElementById("balance-display").innerText = "Switching...";
          connectWS(nextToken);
      } else {
          // If the second token wasn't captured, re-authenticate once
          window.location.href = `https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}&l=EN&brand=deriv`;
      }
  }

  (function init() {
      const params = new URLSearchParams(window.location.search);
      const t1 = params.get("token1");
      const t2 = params.get("token2");

      // On first login, capture all available tokens
      if (t1) {
          localStorage.setItem("deriv_token_1", t1);
          if (t2) localStorage.setItem("deriv_token_2", t2);
          window.location.href = window.location.origin + window.location.pathname;
          return;
      }

      const savedToken = localStorage.getItem("deriv_token_1");
      if (savedToken) {
          connectWS(savedToken);
      } else {
          window.location.href = "index.html";
      }
  })();

  function connectWS(token){
    currentToken = token;
    ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=" + APP_ID);
    
    ws.onopen = () => {
      ws.send(JSON.stringify({ authorize: token }));
    };

    ws.onmessage = (msg) => {
      const data = JSON.parse(msg.data);

      if(data.msg_type === "authorize" && data.authorize){
        const loginId = data.authorize.loginid;
        document.getElementById("display-id").innerText = "ID: " + loginId;
        
        // Update button text based on current account type
        const isDemo = loginId.startsWith("VRTC");
        document.getElementById("btn-switch").innerText = isDemo ? "To Real" : "To Demo";
        
        // Subscribe to real-time balance
        ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
      }

      if(data.msg_type === "balance"){
        accountBalance = data.balance.balance;
        document.getElementById("balance-display").innerText = accountBalance + " " + data.balance.currency;
      }
    };
  }

  const predictionList = [1,5,6,7,8,9];
  let currentPrediction = 0;

  function runBot() {
    const stake = parseFloat(document.getElementById("userStake").value);
    const runBtn = document.getElementById("runBtn");
    
    if(accountBalance < stake) {
        alert("Insufficient balance!");
        return;
    }

    document.getElementById("loader-modal").style.display = "flex";
    document.getElementById("loader-text").innerText = "Processing Trade...";
    runBtn.disabled = true;

    setTimeout(()=>{
      document.getElementById("loader-modal").style.display = "none";
      runBtn.disabled = false;

      const prediction = predictionList[currentPrediction];
      currentPrediction = (currentPrediction + 1) % predictionList.length;
      
      const isWin = Math.random() > 0.45;
      const profit = isWin ? (stake * 0.95) : -stake;

      const log = document.getElementById("tradesList");
      const item = document.createElement("div");
      item.className = "trade-item";
      item.innerHTML = `<span>Pred: ${prediction}</span> <strong style="color:${isWin ? 'var(--success)':'var(--danger)'}">${isWin ? 'WIN' : 'LOSS'}</strong> <span>$${profit.toFixed(2)}</span>`;
      
      if(log.innerText.includes("Waiting")) log.innerHTML = "";
      log.prepend(item);
    }, 1200);
  }
</script>

</body>
</html>
