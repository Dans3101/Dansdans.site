<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dans Trading Bots - Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary-blue: #1e40af;
            --success-green: #00c853;
            --danger-red: #ef4444;
            --bg-light: #f3f4f6;
        }

        body {
            margin: 0;
            font-family: -apple-system, sans-serif;
            background-color: var(--bg-light);
        }

        /* Top Navigation - Photo 2 Style */
        header {
            background: white;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin: 20px;
            text-align: center;
        }

        /* Terminal Overlay - Fixes Photo 7 */
        #bot-terminal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: white;
            z-index: 9999;
        }

        .terminal-header {
            background: #111827;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .exit-btn {
            background: var(--danger-red);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        iframe {
            width: 100%;
            height: calc(100vh - 60px);
            border: none;
        }

        .btn-launch {
            background: var(--success-green);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>

<div id="bot-terminal-overlay">
    <div class="terminal-header">
        <span style="font-weight: bold;">Dans Bot Terminal v2.0</span>
        <button class="exit-btn" onclick="closeBot()">✕ EXIT TO DASHBOARD</button>
    </div>
    <iframe id="bot-iframe" src=""></iframe>
</div>

<header>
    <h2 style="color:var(--primary-blue); margin:0;">DANS TRADING</h2>
    <button style="color:var(--danger-red); background:none; border:1px solid; border-radius:5px; padding:5px 15px;" onclick="logout()">Logout</button>
</header>

<div class="container" style="max-width: 500px; margin: auto;">
    <div class="card">
        <h3 style="margin-top:0;">Account Summary</h3>
        <div style="background:#eff6ff; padding:20px; border-radius:12px; margin:15px 0;">
            <div style="font-size:12px; color:#6b7280;">TOTAL BALANCE</div>
            <div style="font-size:32px; font-weight:800; color:var(--primary-blue);"><span id="balance">0.00</span> <small id="currency">USD</small></div>
        </div>
        <div style="text-align:left; font-size:14px; color:#374151;">
            <strong>Account ID:</strong> <span id="account_id">Loading...</span>
        </div>
    </div>

    <div class="card">
        <div style="font-size:40px;">🤖</div>
        <h3>Digit Over Bot v2.0</h3>
        <p style="color:#6b7280; font-size:14px;">Optimized Volatility Strategy. Ready to run.</p>
        <button class="btn-launch" onclick="openBot()">Launch Bot Terminal</button>
    </div>
</div>

<script>
const token = localStorage.getItem("deriv_token");
if(!token) window.location.href = "index.html";

// WebSocket logic for balance...
const ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=129457");
ws.onopen = () => ws.send(JSON.stringify({ authorize: token }));
ws.onmessage = (msg) => {
    const data = JSON.parse(msg.data);
    if(data.msg_type === "authorize"){
        document.getElementById("account_id").innerText = data.authorize.loginid;
        document.getElementById("balance").innerText = data.authorize.balance;
        document.getElementById("currency").innerText = data.authorize.currency;
    }
};

function openBot() {
    // FIX: Using the newer 'bot.deriv.com' endpoint which is more stable for imports
    const xmlPath = "https://dans3101.github.io/Dansdans.site/bots/digit_over.xml";
    const botUrl = `https://bot.deriv.com/?strategy=${encodeURIComponent(xmlPath)}`;
    
    document.getElementById("bot-iframe").src = botUrl;
    document.getElementById("bot-terminal-overlay").style.display = "block";
}

function closeBot() {
    document.getElementById("bot-terminal-overlay").style.display = "none";
    document.getElementById("bot-iframe").src = "";
}

function logout() {
    localStorage.clear();
    window.location.href = "index.html";
}
</script>
</body>
</html>
