<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dans Trading Bots - Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
            background:#0f172a;
            color:white;
        }

        header{
            background:#111827;
            padding:15px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        button{
            padding:10px 15px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-weight:bold;
        }

        .primary{
            background:#16a34a;
            color:white;
        }

        .danger{
            background:#dc2626;
            color:white;
        }

        .container{
            padding:20px;
        }

        .card{
            background:#1e293b;
            padding:20px;
            border-radius:10px;
            margin-bottom:20px;
        }

        select{
            padding:8px;
            border-radius:6px;
        }
    </style>
</head>
<body>

<header>
    <h2>Dans Trading Bots</h2>
    <button class="danger" onclick="logout()">Logout</button>
</header>

<div class="container">

    <div class="card">
        <h3>Account Information</h3>
        <p><strong>Account ID:</strong> <span id="account_id">Loading...</span></p>
        <p><strong>Balance:</strong> <span id="balance">Loading...</span></p>
        <p><strong>Currency:</strong> <span id="currency">-</span></p>
        <p><strong>Account Type:</strong> <span id="account_type">-</span></p>

        <br>

        <label>Switch Account:</label>
        <select id="account_list"></select>
        <button class="primary" onclick="switchAccount()">Switch</button>
    </div>

    <div class="card">
        <h3>Digit Over Bot</h3>
        <p>Strategy: Trades Digit Over contracts automatically.</p>
        <button class="primary" onclick="openBot()">Run Bot</button>
    </div>

</div>

<script>
const token = localStorage.getItem("deriv_token");

if(!token){
    window.location.href = "index.html";
}

const ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=129457");

ws.onopen = function(){
    ws.send(JSON.stringify({
        authorize: token
    }));
};

ws.onmessage = function(msg){
    const data = JSON.parse(msg.data);

    if(data.msg_type === "authorize"){
        document.getElementById("account_id").innerText = data.authorize.loginid;
        document.getElementById("balance").innerText = data.authorize.balance;
        document.getElementById("currency").innerText = data.authorize.currency;

        if(data.authorize.loginid.startsWith("CR")){
            document.getElementById("account_type").innerText = "Demo Account";
        } else {
            document.getElementById("account_type").innerText = "Real Account";
        }

        loadAccounts(data.authorize.account_list);
    }
};

function loadAccounts(accounts){
    const select = document.getElementById("account_list");
    select.innerHTML = "";

    accounts.forEach(acc=>{
        let option = document.createElement("option");
        option.value = acc.token;
        option.text = acc.loginid + " (" + acc.currency + ")";
        select.appendChild(option);
    });
}

function switchAccount(){
    const newToken = document.getElementById("account_list").value;
    localStorage.setItem("deriv_token", newToken);
    location.reload();
}

function openBot(){
    const botUrl = "https://deriv.app/bot?import=https://Dans3101.github.io/Dansdans.site/bots/digit_over.xml";
    window.open(botUrl, "_blank");
}

function logout(){
    localStorage.removeItem("deriv_token");
    window.location.href = "index.html";
}
</script>

</body>
</html>
