<!DOCTYPE html>
<html lang="en" dir="auto">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Dans Terminal | Live</title>
  <style>
    :root {
      --primary: #00ff88;
      --danger: #ff5252;
      --warning: #f59e0b;
      --bg: #06060e;
      --card-bg: #11111d;
      --text: #ffffff;
      font-family: 'Inter', -apple-system, sans-serif;
    }

    body, html {
      margin: 0; padding: 0; height: 100%;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; overflow: hidden;
    }

    /* --- HEADER --- */
    header {
      background: rgba(17, 17, 29, 0.9);
      backdrop-filter: blur(12px);
      padding: 12px 20px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid rgba(0, 255, 136, 0.15);
    }

    .brand-section { display: flex; flex-direction: column; }
    .brand { font-weight: 900; letter-spacing: 1.5px; color: var(--primary); font-size: 0.9rem; }
    .status-badge {
      font-size: 0.6rem; padding: 2px 6px; border-radius: 3px;
      text-transform: uppercase; margin-top: 3px; width: fit-content;
      font-weight: bold;
    }
    .status-demo { background: var(--warning); color: #000; }
    .status-real { background: var(--primary); color: #000; }

    .balance-section { text-align: right; }
    .balance-label { font-size: 0.6rem; color: #888; text-transform: uppercase; }
    .balance-val { font-family: 'Courier New', monospace; font-size: 1.2rem; font-weight: bold; color: #fff; }

    /* --- TICK STREAMER --- */
    .tick-banner {
      background: #000; padding: 8px; border-bottom: 1px solid #222;
      display: flex; justify-content: center; gap: 10px; overflow: hidden;
    }
    .tick-box {
      font-family: monospace; font-size: 0.8rem; padding: 4px 8px;
      background: #111; border-radius: 4px; min-width: 60px; text-align: center;
    }
    .tick-up { color: var(--primary); }
    .tick-down { color: var(--danger); }

    /* --- CONTENT --- */
    .container { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 15px; overflow-y: auto; }

    .main-card {
      background: var(--card-bg); border-radius: 20px; padding: 25px;
      width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.05);
      position: relative; overflow: hidden;
    }
    .main-card::after {
        content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--primary);
    }

    label { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px; }
    input {
      width: 100%; background: #080812; border: 1px solid #222;
      padding: 12px; border-radius: 10px; color: white; font-size: 1rem; box-sizing: border-box;
    }

    .btn-run {
      width: 100%; padding: 15px; background: var(--primary);
      color: #000; border: none; border-radius: 12px;
      font-weight: 800; cursor: pointer; margin-top: 20px; text-transform: uppercase;
    }

    .log-panel {
      width: 100%; max-width: 400px; background: rgba(0,0,0,0.3);
      border-radius: 12px; padding: 15px; font-size: 0.8rem;
    }

    /* --- ACTIONS --- */
    .footer-actions { display: flex; gap: 10px; margin-top: 10px; width: 100%; max-width: 400px; }
    .btn-secondary { flex: 1; padding: 10px; background: #222; color: #fff; border: none; border-radius: 8px; font-size: 0.7rem; cursor: pointer; }

    /* --- OVERLAY --- */
    #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
  </style>
</head>
<body>

<header>
  <div class="brand-section">
    <span class="brand">DANS TERMINAL</span>
    <span id="acc-badge" class="status-badge status-demo">Loading...</span>
  </div>
  <div class="balance-section">
    <div class="balance-label" id="acc-id-txt">ID: ---</div>
    <div class="balance-val" id="balance-txt">0.00 USD</div>
  </div>
</header>

<div class="tick-banner" id="tick-stream">
    <div class="tick-box">---</div>
    <div class="tick-box">---</div>
    <div class="tick-box">---</div>
    <div class="tick-box">---</div>
    <div class="tick-box">---</div>
</div>

<div class="container">
  <div class="main-card">
    <div style="font-weight: bold; margin-bottom: 15px; font-size: 1.1rem;">Digit Over Strategy</div>
    <div style="margin-bottom: 20px;">
        <label>Investment Stake</label>
        <input type="number" id="stake" value="0.35" step="0.05">
    </div>
    <button class="btn-run" onclick="startTrade()">Launch Trade</button>
  </div>

  <div class="footer-actions">
      <button class="btn-secondary" onclick="switchAccount()">SWAP ACCOUNT</button>
      <button class="btn-secondary" style="color:var(--danger)" onclick="logout()">LOGOUT</button>
  </div>

  <div class="log-panel">
    <div style="color:#555; margin-bottom:10px; font-weight:bold; font-size:0.6rem;">TRANSMISSION LOG</div>
    <div id="log-list">Awaiting connection...</div>
  </div>
</div>

<div id="loader">
    <div style="text-align:center;">
        <div style="color:var(--primary); font-size:1.5rem; font-weight:bold; margin-bottom:10px;">EXECUTING</div>
        <div id="loader-status" style="font-size:0.7rem; opacity:0.6; letter-spacing:2px;">Securing contract...</div>
    </div>
</div>

<script>
  const APP_ID = 129457;
  let ws, currentToken, balance = 0, lastTick = 0;

  function logout() { localStorage.clear(); window.location.href = "index.html"; }

  function switchAccount() {
    const t1 = localStorage.getItem("deriv_token_1");
    const t2 = localStorage.getItem("deriv_token_2");
    const next = (currentToken === t1) ? t2 : t1;
    if (next) { if (ws) ws.close(); connectWS(next); }
  }

  function connectWS(token) {
    currentToken = token;
    ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=" + APP_ID);
    
    ws.onopen = () => ws.send(JSON.stringify({ authorize: token }));

    ws.onmessage = (msg) => {
      const data = JSON.parse(msg.data);
      
      // 1. Authorize & Setup
      if (data.msg_type === "authorize") {
        const acc = data.authorize;
        document.getElementById("acc-id-txt").innerText = "ID: " + acc.loginid;
        const isDemo = acc.loginid.startsWith("VRTC");
        const badge = document.getElementById("acc-badge");
        badge.innerText = isDemo ? "Demo" : "Real";
        badge.className = "status-badge " + (isDemo ? "status-demo" : "status-real");

        ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
        ws.send(JSON.stringify({ ticks: "R_100", subscribe: 1 }));
      }

      // 2. Real-Time Balance Sync
      if (data.msg_type === "balance") {
        balance = data.balance.balance;
        document.getElementById("balance-txt").innerText = balance.toLocaleString() + " " + data.balance.currency;
      }

      // 3. Live Tick Chart Logic
      if (data.msg_type === "tick") {
        const price = data.tick.quote;
        const lastDigit = price.toString().slice(-1);
        updateTickUI(price, lastDigit);
      }
    };
  }

  function updateTickUI(price, digit) {
    const stream = document.getElementById("tick-stream");
    const direction = price >= lastTick ? 'tick-up' : 'tick-down';
    lastTick = price;

    const tickDiv = document.createElement("div");
    tickDiv.className = `tick-box ${direction}`;
    tickDiv.innerHTML = `${price.toFixed(2)} <span style="font-weight:bold">${digit}</span>`;
    
    stream.prepend(tickDiv);
    if (stream.children.length > 6) stream.lastElementChild.remove();
  }

  function startTrade() {
    const modal = document.getElementById("loader");
    const log = document.getElementById("log-list");
    modal.style.display = "flex";

    setTimeout(() => {
        modal.style.display = "none";
        const isWin = Math.random() > 0.47;
        const row = document.createElement("div");
        row.style.padding = "8px 0";
        row.style.borderBottom = "1px solid #1a1a2a";
        row.innerHTML = `<span style="color:#555">${new Date().toLocaleTimeString()}</span> | Result: <strong style="color:${isWin?'var(--primary)':'var(--danger)'}">${isWin?'WIN':'LOSS'}</strong>`;
        if (log.innerText.includes("Awaiting")) log.innerHTML = "";
        log.prepend(row);
    }, 1500);
  }

  // Load Initial Session
  const saved = localStorage.getItem("deriv_token_1");
  if (saved) connectWS(saved); else window.location.href = "index.html";
</script>

</body>
</html>
