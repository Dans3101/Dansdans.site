<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dans Insider - Strategy Hub</title>
    <style>
        :root { --blue: #1e40af; --green: #10b981; --bg: #f3f4f6; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); }

        header { background: #111827; color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 450px; margin: 20px auto; padding: 0 15px; }
        
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; }
        
        .btn-launch { 
            background: var(--blue); color: white; border: none; width: 100%; padding: 18px; 
            border-radius: 12px; font-weight: 800; cursor: pointer; text-decoration: none; display: block;
        }

        .btn-download {
            background: #fff; color: var(--blue); border: 2px solid var(--blue); width: 100%; 
            padding: 12px; border-radius: 10px; font-weight: 700; margin-top: 10px; cursor: pointer;
        }

        .step-box { background: #eff6ff; padding: 15px; border-radius: 10px; text-align: left; margin-top: 15px; font-size: 0.85rem; border: 1px dashed var(--blue); }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900;">DANS INSIDER</div>
    <div id="balance" style="color: var(--green); font-weight: bold;">Updating...</div>
</header>

<div class="container">
    <div class="card">
        <div style="font-size: 3rem;">🤖</div>
        <h2 style="margin: 10px 0;">Digit Over v2.0</h2>
        <p style="color: #6b7280; font-size: 0.9rem;">Strategy: Volatility 100 (1s) | Min Stake $0.35</p>
        
        <a href="https://bot.deriv.com" target="_blank" class="btn-launch">1. OPEN DERIV TERMINAL</a>

        <button class="btn-download" onclick="downloadBot()">2. DOWNLOAD XML FILE</button>

        <div class="step-box">
            <strong>How to Load:</strong>
            <p style="margin: 5px 0;">Inside the Deriv Terminal, click <b>'Import'</b> at the top left and select the file you just downloaded.</p>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem("deriv_token");
    if(!token) window.location.href = "index.html";

    const ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=129457");
    ws.onopen = () => ws.send(JSON.stringify({ authorize: token }));
    ws.onmessage = (msg) => {
        const data = JSON.parse(msg.data);
        if(data.msg_type === "authorize") {
            document.getElementById("balance").innerText = `${data.authorize.balance} ${data.authorize.currency}`;
        }
    };

    function downloadBot() {
        const link = document.createElement('a');
        link.href = 'https://dans3101.github.io/Dansdans.site/bots/digit_over.xml';
        link.download = 'digit_over.xml';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        alert("Bot file downloaded! Now import it in the Deriv Terminal.");
    }
</script>

</body>
</html>
