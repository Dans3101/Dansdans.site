<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DANS TERMINAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0f172a;
color:white;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input, select{
width:100%;
padding:12px;
border-radius:8px;
border:none;
margin-top:8px;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:12px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.green{background:#16a34a;color:white;}
.red{background:#dc2626;color:white;}
.blue{background:#2563eb;color:white;}

table{
width:100%;
margin-top:15px;
border-collapse:collapse;
}

th, td{
padding:10px;
text-align:center;
border-bottom:1px solid #334155;
}
</style>
</head>

<body>

<div class="container">

<h2>DANS TERMINAL</h2>

<div class="card">
<div id="accountStatus">Not Logged In</div>
<div>Balance: $<span id="balance">0.00</span></div>
<div>Total Profit: $<span id="profit">0.00</span></div>
<div id="botStatus">Bot Stopped</div>
<button class="blue" onclick="login()">Login With Deriv</button>
</div>

<div class="card">
<label>Select Account Type</label>
<select id="accountType">
<option value="demo">Demo Account</option>
<option value="real">Real Account</option>
</select>

<label>Stake Amount</label>
<input type="number" id="stake" value="0.35" step="0.01">

<label>Digit Prediction (0-9)</label>
<input type="number" id="digit" value="5" min="0" max="9">
</div>

<div class="card">
<button class="green" onclick="startBot()">START BOT</button>
<button class="red" onclick="stopBot()">STOP BOT</button>

<table id="tradeTable">
<tr>
<th>Entry</th>
<th>Exit</th>
<th>Profit</th>
</tr>
</table>
</div>

</div>

<script>
const APP_ID = 129457; // 🔴 REPLACE WITH YOUR APP ID
let ws;
let token=null;
let running=false;
let totalProfit=0;

function login(){
let type=document.getElementById("accountType").value;
let redirect=window.location.href.split("?")[0];

window.location.href=
`https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}&l=EN&brand=deriv&account=${type}&redirect_uri=${redirect}`;
}

const params=new URLSearchParams(window.location.search);
if(params.get("token")){
token=params.get("token");
connect();
}

function connect(){
ws=new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`);

ws.onopen=()=>{
ws.send(JSON.stringify({authorize:token}));
};

ws.onmessage=(msg)=>{
let data=JSON.parse(msg.data);

if(data.msg_type==="authorize"){
document.getElementById("accountStatus").innerText=
"Logged In: "+data.authorize.loginid;

ws.send(JSON.stringify({
balance:1,
subscribe:1
}));
}

if(data.msg_type==="balance"){
document.getElementById("balance").innerText=
parseFloat(data.balance.balance).toFixed(2);
}

if(data.msg_type==="proposal"){
let stake=parseFloat(document.getElementById("stake").value);

ws.send(JSON.stringify({
buy:data.proposal.id,
price:stake
}));
}

if(data.msg_type==="buy"){
ws.send(JSON.stringify({
proposal_open_contract:1,
contract_id:data.buy.contract_id,
subscribe:1
}));
}

if(data.msg_type==="proposal_open_contract"){
let contract=data.proposal_open_contract;

if(contract.is_sold){

let profit=parseFloat(contract.profit);
totalProfit+=profit;

document.getElementById("profit").innerText=
totalProfit.toFixed(2);

addTradeRow(
contract.entry_tick,
contract.exit_tick,
profit
);

if(running){
trade();
}
}
}
};
}

function startBot(){
if(!ws){
alert("Login first!");
return;
}
running=true;
document.getElementById("botStatus").innerText="Bot Running...";
trade();
}

function stopBot(){
running=false;
document.getElementById("botStatus").innerText="Bot Stopped";
}

function trade(){
let stake=parseFloat(document.getElementById("stake").value);
let digit=document.getElementById("digit").value;

ws.send(JSON.stringify({
proposal:1,
amount:stake,
basis:"stake",
contract_type:"DIGITOVER",
currency:"USD",
duration:1,
duration_unit:"t",
symbol:"R_100",
barrier:digit
}));
}

function addTradeRow(entry,exit,profit){
let table=document.getElementById("tradeTable");
let row=table.insertRow(1);

row.insertCell(0).innerText=entry;
row.insertCell(1).innerText=exit;
row.insertCell(2).innerText=profit.toFixed(2);

row.style.color=profit>=0?"#16a34a":"#dc2626";
}
</script>

</body>
</html>
