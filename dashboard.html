<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dans Trading Terminal</title>
<style>
body {font-family:sans-serif;background:#f3f4f6;margin:0;}
header {background:white;padding:15px;display:flex;justify-content:space-between;}
.container {max-width:500px;margin:20px auto;}
.card {background:white;padding:20px;border-radius:15px;margin-bottom:15px;}
button {width:100%;padding:12px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;}
.start {background:#10b981;color:white;}
.stop {background:#ef4444;color:white;}
input {width:100%;padding:10px;margin-top:8px;border-radius:8px;border:1px solid #ddd;}
</style>
</head>
<body>

<header>
<div><b>DANS TERMINAL</b></div>
<div id="balance">Loading...</div>
</header>

<div class="container">

<div class="card">
<label>Stake Amount</label>
<input type="number" id="stake" value="1" min="0.35" step="0.01">
</div>

<div class="card">
<div>Current Prediction: <b id="prediction">0</b></div>
<div>Total Profit: <b id="profit">0.00</b></div>
</div>

<div class="card">
<button class="start" onclick="startBot()">START BOT</button>
<button class="stop" onclick="stopBot()">STOP BOT</button>
</div>

</div>

<script>
const token = localStorage.getItem("deriv_token");
if(!token) window.location.href="index.html";

const app_id = 129457;
let ws;
let running=false;
let totalProfit=0;
let currentPredictionIndex=0;
const predictionList=[0,4,5,6,7,8];

function connect(){
ws = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${app_id}`);

ws.onopen=()=>{
ws.send(JSON.stringify({authorize:token}));
};

ws.onmessage=(msg)=>{
const data=JSON.parse(msg.data);

if(data.msg_type==="authorize"){
document.getElementById("balance").innerText=
data.authorize.balance+" "+data.authorize.currency;
}

if(data.msg_type==="proposal"){
buyContract(data.proposal.id);
}

if(data.msg_type==="buy"){
monitorContract(data.buy.contract_id);
}

if(data.msg_type==="proposal_open_contract"){
if(data.proposal_open_contract.is_sold){
const profit=data.proposal_open_contract.profit;
totalProfit+=profit;
document.getElementById("profit").innerText=totalProfit.toFixed(2);

if(profit>0){
currentPredictionIndex=0;
}else{
currentPredictionIndex++;
if(currentPredictionIndex>=predictionList.length){
currentPredictionIndex=0;
}
}

document.getElementById("prediction").innerText=
predictionList[currentPredictionIndex];

if(running) trade();
}
}
};
}

function trade(){
const stake=parseFloat(document.getElementById("stake").value);

ws.send(JSON.stringify({
proposal:1,
amount:stake,
basis:"stake",
contract_type:"DIGITOVER",
currency:"USD",
duration:1,
duration_unit:"t",
symbol:"1HZ100V",
barrier:predictionList[currentPredictionIndex]
}));
}

function buyContract(id){
ws.send(JSON.stringify({
buy:id,
price:parseFloat(document.getElementById("stake").value)
}));
}

function monitorContract(id){
ws.send(JSON.stringify({
proposal_open_contract:1,
contract_id:id,
subscribe:1
}));
}

function startBot(){
if(!ws || ws.readyState!==1) connect();
running=true;
setTimeout(()=>{trade();},1000);
}

function stopBot(){
running=false;
}

connect();
</script>

</body>
</html>
