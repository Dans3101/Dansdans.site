<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dans Insider - Terminal Dashboard</title>
    <style>
        :root { --primary: #1e40af; --success: #10b981; --bg: #f3f4f6; }
        body { margin: 0; padding: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: #1f2937; }

        header {
            background: #111827;
            color: white;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .container { max-width: 500px; margin: 20px auto; padding: 0 15px; }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .btn-main {
            background: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            display: block;
            margin-bottom: 15px;
        }

        .btn-download {
            background: #f3f4f6;
            color: #4b5563;
            border: 1px solid #d1d5db;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
        }

        .guide-box {
            text-align: left;
            background: #fffbeb;
            border: 1px solid #fef3c7;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<header>
    <div style="font-weight: 900; letter-spacing: 1px;">DANS INSIDER</div>
    <div id="balance" style="font-weight: bold; color: var(--success);">0.00 USD</div>
</header>

<div class="container">
    <div class="card">
        <div style="font-size: 3rem; margin-bottom: 10px;">🤖</div>
        <h2 style="margin: 0 0 10px 0;">Digit Over Bot v2.0</h2>
        <p style="color: #6b7280; margin-bottom: 25px;">Ready to automate your trading on Volatility 100 (1s).</p>
        
        <button class="btn-main" onclick="launchAuto()">AUTO-LOAD TERMINAL</button>
        
        <div style="margin: 20px 0; color: #9ca3af; font-size: 0.8rem;">OR USE MANUAL IMPORT</div>
        
        <a href="https://dans3101.github.io/Dansdans.site/bots/digit_over.xml" download="digit_over.xml" class="btn-download">
            📥 DOWNLOAD BOT FILE (.XML)
        </a>

        <div class="guide-box">
            <strong style="color: #92400e;">Manual Instructions:</strong>
            <ol style="margin: 10px 0 0 20px; padding: 0;">
                <li>Download the <strong>.XML</strong> file above.</li>
                <li>Go to the <a href="https://bot.deriv.com" target="_blank">Deriv Bot Terminal</a>.</li>
                <li>Click <strong>Import</strong> and select the file from your downloads.</li>
            </ol>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem("deriv_token");
    if(!token) window.location.href = "index.html";

    const ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=129457");
    ws.onopen = () => ws.send(JSON.stringify({ authorize: token }));
    ws.onmessage = (msg) => {
        const data = JSON.parse(msg.data);
        if(data.msg_type === "authorize") {
            document.getElementById("balance").innerText = `${data.authorize.balance} ${data.authorize.currency}`;
        }
    };

    function launchAuto() {
        const xml = "https://dans3101.github.io/Dansdans.site/bots/digit_over.xml";
        window.location.href = `https://bot.deriv.com/?strategy=${encodeURIComponent(xml)}`;
    }
</script>

</body>
</html>
