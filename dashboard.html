<!DOCTYPE html>
<html lang="en" dir="auto" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dans Trading Dashboard</title>
  <style>
    :root {
      --primary: #1e40af;
      --success: #10b981;
      --danger: #ef4444;
      --bg-light: #f3f4f6;
      --card-bg: #ffffff;
      font-size: 16px;
      font-family: "Segoe UI", Roboto, Helvetica, sans-serif;
    }

    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background: var(--bg-light);
      display: flex;
      flex-direction: column;
    }

    /* Updated Header for Account Info */
    header {
      background: var(--primary);
      color: white;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    .header-title {
      font-size: 1.5rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .account-info {
      margin-top: 10px;
      display: flex;
      justify-content: center;
      gap: 20px;
      font-size: 0.9rem;
      opacity: 0.9;
    }

    .balance-pill {
      background: rgba(255, 255, 255, 0.1);
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: bold;
      color: var(--success);
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px;
      gap: 20px;
    }

    .account-select {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      align-items: center;
      font-weight: bold;
    }

    .bot-card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 25px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    .btn-action {
      padding: 15px 20px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
      width: 100%;
    }

    .trades-log {
      max-width: 500px;
      width: 100%;
      background: var(--card-bg);
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .trade-item {
      padding: 10px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
    }

    #loader-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }

    #loader-content {
      background: white;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">Dans Trading Dashboard</div>
  <div class="account-info">
    <span id="display-account">ID: ---</span>
    <span class="balance-pill" id="balance-display">Balance: Loading...</span>
  </div>
</header>

<div class="container">
  <div class="account-select">
    <label>Account:</label>
    <select id="accountType">
      <option value="demo">Demo</option>
      <option value="real">Real</option>
    </select>
    <button class="btn-action" onclick="login()" style="width: auto; padding: 8px 15px; margin-top: 0;">Switch Account</button>
  </div>

  <div class="bot-card">
    <h3>Digit Over Bot v2.0</h3>
    <p>Volatility 100 (1s) | Digit Strategy</p>
    <input type="number" id="userStake" value="0.35" step="0.01" style="width:80%; padding:10px; border-radius:10px; border:1px solid #ccc; margin-top:10px;">
    <button class="btn-action" onclick="runBot()">Run Bot</button>
  </div>

  <div class="trades-log" id="tradesLog">
    <h4>Executed Trades</h4>
    <div id="tradesList">No trades yet.</div>
  </div>
</div>

<div id="loader-modal">
  <div id="loader-content">
    <h3>Connecting...</h3>
    <p>Syncing with Deriv Secure Servers.</p>
  </div>
</div>

<script>
  const APP_ID = 129457;
  const REDIRECT_URI = window.location.origin + window.location.pathname;
  let ws, accountBalance = 0;

  function login() {
    localStorage.removeItem("deriv_token");
    window.location.href = `https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}&l=EN&brand=deriv`;
  }

  (function handleAuth() {
    const params = new URLSearchParams(window.location.search);
    const token1 = params.get("token1");

    if (token1) {
      localStorage.setItem("deriv_token", token1);
      localStorage.setItem("auto_launch_bot", "true");
      window.location.href = REDIRECT_URI;
      return;
    }

    const savedToken = localStorage.getItem("deriv_token");
    if (savedToken) {
      connectWS(savedToken);
      if(localStorage.getItem("auto_launch_bot") === "true") {
        localStorage.removeItem("auto_launch_bot");
        setTimeout(() => runBot(), 1500);
      }
    }
  })();

  function connectWS(token){
    ws = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=" + APP_ID);
    
    ws.onopen = () => {
      // Authorize
      ws.send(JSON.stringify({ authorize: token }));
    };

    ws.onmessage = (msg) => {
      const data = JSON.parse(msg.data);

      // Handle Authorization Response
      if(data.msg_type === "authorize" && data.authorize){
        const auth = data.authorize;
        document.getElementById("display-account").innerText = `ID: ${auth.loginid}`;
        document.getElementById("balance-display").innerText = `${auth.balance} ${auth.currency}`;
        accountBalance = parseFloat(auth.balance);

        // Subscribe to balance updates so it refreshes automatically
        ws.send(JSON.stringify({ balance: 1, subscribe: 1 }));
      }

      // Handle Balance Subscription updates
      if(data.msg_type === "balance"){
        const bal = data.balance;
        document.getElementById("balance-display").innerText = `${bal.balance} ${bal.currency}`;
        accountBalance = parseFloat(bal.balance);
      }
    };
  }

  const predictionList = [0,4,5,6,7,8];
  let currentPrediction = 0;

  function runBot() {
    const userToken = localStorage.getItem("deriv_token");
    const stakeInput = parseFloat(document.getElementById("userStake").value) || 0.35;
    
    if(!userToken){
      alert("Please login first!");
      return;
    }

    document.getElementById("loader-modal").style.display = "flex";

    setTimeout(()=>{
      document.getElementById("loader-modal").style.display = "none";

      const prediction = predictionList[currentPrediction];
      currentPrediction = (currentPrediction + 1) % predictionList.length;
      
      const trade = {
        id: Date.now(),
        prediction,
        stake: stakeInput,
        result: Math.random() > 0.5 ? "win" : "loss"
      };

      const log = document.getElementById("tradesList");
      const item = document.createElement("div");
      item.classList.add("trade-item");
      item.innerHTML = `<span>Pred: ${trade.prediction}</span> <span>$${trade.stake}</span> <strong style="color:${trade.result === 'win' ? 'var(--success)' : 'var(--danger)'}">${trade.result.toUpperCase()}</strong>`;
      if(log.innerText === "No trades yet.") log.innerHTML = "";
      log.prepend(item);

      // Note: In a real bot, the balance update would come from the WebSocket automatically
      // But for this simulation, we update the local display too
      accountBalance += (trade.result === "win" ? trade.stake * 0.95 : -trade.stake);
      document.getElementById("balance-display").innerText = `${accountBalance.toFixed(2)}`;
    }, 1500);
  }
</script>

</body>
</html>
