<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DANS TERMINAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
padding:20px;
font-size:22px;
font-weight:bold;
background:#111827;
}

.container{
padding:20px;
max-width:600px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

input,select{
width:100%;
padding:12px;
border-radius:8px;
border:none;
margin-top:10px;
font-size:16px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
margin-top:10px;
font-weight:bold;
cursor:pointer;
}

.start{background:#16a34a;color:white;}
.stop{background:#dc2626;color:white;}
.login{background:#2563eb;color:white;}

.status{
margin-top:10px;
font-size:14px;
}
</style>
</head>

<body>

<header>DANS TERMINAL</header>

<div class="container">

<div class="card">
<button class="login" onclick="login()">Login With Deriv</button>
<div class="status" id="accountStatus">Not Logged In</div>
</div>

<div class="card">
<label>Stake Amount</label>
<input type="number" id="stake" value="0.35" min="0.35" step="0.01">

<label>Digit Prediction (Over)</label>
<select id="digit">
<option value="0">0</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
<option value="7">7</option>
<option value="8">8</option>
</select>
</div>

<div class="card">
<div>Profit: <span id="profit">0.00</span></div>
<button class="start" onclick="startBot()">START BOT</button>
<button class="stop" onclick="stopBot()">STOP BOT</button>
<div class="status" id="botStatus">Bot Stopped</div>
</div>

</div>

<script>
const APP_ID = 129457; // 🔴 REPLACE WITH YOUR REAL APP ID
let ws;
let token = null;
let balance = 0;
let totalProfit = 0;
let running = false;

function login(){
window.location.href =
`https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}&l=EN&brand=deriv`;
}

const params = new URLSearchParams(window.location.search);
if(params.get("token")){
token = params.get("token");
connect();
}

function connect(){
ws = new WebSocket(`wss://ws.derivws.com/websockets/v3?app_id=${APP_ID}`);

ws.onopen = () => {
ws.send(JSON.stringify({
authorize: token
}));
};

ws.onmessage = (msg) => {
let data = JSON.parse(msg.data);

if(data.msg_type === "authorize"){
document.getElementById("accountStatus").innerText =
"Logged In: " + data.authorize.loginid;
}

if(data.msg_type === "buy"){
ws.send(JSON.stringify({
proposal_open_contract: 1,
contract_id: data.buy.contract_id,
subscribe: 1
}));
}

if(data.msg_type === "proposal_open_contract"){
if(data.proposal_open_contract.is_sold){
let profit = parseFloat(data.proposal_open_contract.profit);
totalProfit += profit;
document.getElementById("profit").innerText = totalProfit.toFixed(2);

if(running){
trade();
}
}
}
};
}

function startBot(){
if(!ws){
alert("Login first!");
return;
}
running = true;
document.getElementById("botStatus").innerText = "Bot Running...";
trade();
}

function stopBot(){
running = false;
document.getElementById("botStatus").innerText = "Bot Stopped";
}

function trade(){
let stake = parseFloat(document.getElementById("stake").value);
let digit = document.getElementById("digit").value;

ws.send(JSON.stringify({
proposal: 1,
amount: stake,
basis: "stake",
contract_type: "DIGITOVER",
currency: "USD",
duration: 1,
duration_unit: "t",
symbol: "R_100",
barrier: digit
}));

ws.onmessage = (msg) => {
let data = JSON.parse(msg.data);

if(data.msg_type === "proposal"){
ws.send(JSON.stringify({
buy: data.proposal.id,
price: stake
}));
}
};
}
</script>

</body>
</html>
