<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dans-Dans Trading Bots</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      margin: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    nav {
      background: #102a43;
      color: white;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 100%;
      max-width: 450px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }
    .btn {
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .btn-primary { background: #102a43; color: white; width: 100%; margin-top: 15px; }
    .btn-run { background: #27ae60; color: white; width: 48%; margin-top: 10px; margin-right: 2%; }
    .btn-stop { background: #d91e18; color: white; width: 48%; margin-top: 10px; }
    .status { margin-top: 15px; font-size: 14px; color: #555; }
  </style>
</head>
<body>
  <nav>
    <div><strong>Dans-Dans Trading Bots</strong></div>
    <a href="/" style="color:white;text-decoration:none;">Home</a>
  </nav>

  <div class="main">
    <div class="card" id="bot-card">
      <h2>AI Digit Strategy v3.1</h2>
      <p style="color:#666;">Connect your Deriv account to start automated trading.</p>
      <a href="/login" class="btn btn-primary">Connect to Deriv</a>
    </div>
  </div>

  <script>
    async function registerUser(acct, token) {
      await fetch('/register-user', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ acct, token })
      });
    }

    async function loadBotUI(acct) {
      const res = await fetch('/bot-info');
      const bot = await res.json();

      const card = document.getElementById('bot-card');
      card.innerHTML = `
        <h2>${bot.botName}</h2>
        <p style="color:#666;">${bot.botDescription}</p>
        <div class="status" id="bot-status">Bot Ready 🟡</div>
        <button class="btn btn-run" onclick="startBot('${acct}')">Run Bot</button>
        <button class="btn btn-stop" onclick="stopBot('${acct}')">Stop Bot</button>
      `;
    }

    async function startBot(acct) {
      const res = await fetch('/start-bot', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ acct })
      });
      const data = await res.json();
      document.getElementById('bot-status').innerText = data.success ? 'Bot Running 🚀' : 'Failed to start';
    }

    async function stopBot(acct) {
      const res = await fetch('/stop-bot', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ acct })
      });
      const data = await res.json();
      document.getElementById('bot-status').innerText = data.success ? 'Bot Stopped 🛑' : 'Failed to stop';
    }

    // Check if user returned from Deriv OAuth
    const urlParams = new URLSearchParams(window.location.search);
    const acct = urlParams.get('acct');
    const token = urlParams.get('token');

    if (acct && token) {
      // register user and show bot UI
      registerUser(acct, token).then(() => loadBotUI(acct));
    }
  </script>
</body>
</html>
