<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Deriv OAuth Callback</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f2f5; }
    .container { text-align: center; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h2 { color: #102a43; }
    p { color: #555; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Connecting to Deriv...</h2>
    <p>Please wait while we redirect you to the bot page.</p>
  </div>

  <script>
    // Get query parameters from Deriv redirect
    const params = new URLSearchParams(window.location.search);
    const token = params.get('access_token') || params.get('token1'); // depending on Deriv response
    const acct = params.get('account') || params.get('acct1'); // account number

    if (token && acct) {
      // Redirect to your main bot page with token & account in query string
      const redirectUrl = `index.html?token=${encodeURIComponent(token)}&acct=${encodeURIComponent(acct)}`;
      window.location.href = redirectUrl;
    } else {
      document.querySelector('.container').innerHTML = `
        <h2>Connection Failed</h2>
        <p>No token received from Deriv. Please try again.</p>
        <a href="index.html">Go Back</a>
      `;
    }
  </script>
</body>
</html>
