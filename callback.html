<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dans-Dans Trading Bot - Callback</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      color: #102a43;
    }
    .loader {
      border: 6px solid #f3f3f3;
      border-top: 6px solid #102a43;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg);}
      100% { transform: rotate(360deg);}
    }
    p { font-size: 16px; color:#555; }
  </style>
</head>
<body>
  <div class="loader"></div>
  <p>Connecting to your Deriv account...</p>

  <script>
    // Parse URL params sent by Deriv OAuth
    const params = new URLSearchParams(window.location.search);
    const acct = params.get('acct1');   // Deriv account
    const token = params.get('token1'); // OAuth token

    if (!acct || !token) {
      document.querySelector('p').innerText = "Failed to connect to Deriv. Missing account or token.";
    } else {
      // Redirect back to index.html with token and account in query string
      const redirectUrl = `/index.html?acct=${encodeURIComponent(acct)}&token=${encodeURIComponent(token)}`;
      window.location.href = redirectUrl;
    }
  </script>
</body>
</html>
