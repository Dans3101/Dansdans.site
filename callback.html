<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating | Dans Trading Bots</title>

    <style>
        :root {
            --primary-blue: #1e40af;
            --bg-light: #f3f4f6;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: var(--bg-light);
        }

        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 90%;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-blue);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h2 { color: #111827; margin-bottom: 10px; }
        p { color: #6b7280; font-size: 0.95rem; }

        .error-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: var(--primary-blue);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="container" id="status-card">
    <div class="loader"></div>
    <h2>Verifying Session</h2>
    <p>Please wait while we secure your trading terminal...</p>
</div>
<script>
function handleOAuth() {
    console.log("Full URL:", window.location.href);
    console.log("Hash:", window.location.hash);

    const hash = window.location.hash.substring(1);

    if (!hash) {
        showError("No OAuth data returned from Deriv.");
        return;
    }

    const params = new URLSearchParams(hash);
    const token = params.get("access_token");

    if (token) {

        console.log("Access token received:", token);

        localStorage.setItem("deriv_token", token);

        window.history.replaceState({}, document.title, "callback.html");

        setTimeout(() => {
            window.location.href = "dashboard.html";
        }, 1000);

    } else {
        showError("Access token missing in URL.");
    }
}

function showError(message) {
    document.getElementById('status-card').innerHTML = `
        <h2 style="color:#ef4444;">Authentication Failed</h2>
        <p>${message}</p>
        <a href="index.html" class="error-btn">Return to Login</a>
    `;
}

handleOAuth();
</script>

</body>
</html>
