<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Dans Trading | Secure Terminal</title>
    <style>
        :root {
            --primary: #00ff88; /* Cyber Green */
            --bg: #0a0a1a;
            --card-bg: #16162d;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* --- CYBER TECH LOADER (From your source) --- */
        #loader-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a1a 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .core {
            width: 100px;
            height: 100px;
            position: relative;
        }

        .core-ring {
            position: absolute;
            inset: 0;
            border: 2px solid var(--primary);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        .core-center {
            position: absolute;
            inset: 30px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--primary);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.3; }
        }

        /* --- LOGIN CARD --- */
        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .btn-connect {
            width: 100%;
            padding: 18px;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <div class="core">
            <div class="core-ring"></div>
            <div class="core-center"></div>
        </div>
        <p style="margin-top: 20px; letter-spacing: 3px; color: var(--primary);">INITIALIZING TERMINAL...</p>
    </div>

    <div class="card">
        <h1 style="margin:0;">DANS TRADING</h1>
        <p style="color: #888; font-size: 0.9rem;">Advanced Automated Bot Builder</p>
        <button class="btn-connect" onclick="connectDeriv()">Connect Deriv Account</button>
    </div>

    <script>
        const APP_ID = 129457;

        function connectDeriv() {
            window.location.href = `https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}&l=EN&brand=deriv`;
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('token1')) {
                localStorage.setItem("deriv_token_1", urlParams.get('token1'));
                localStorage.setItem("deriv_token_2", urlParams.get('token2') || "");
                window.location.href = "dashboard.html";
            } else if (localStorage.getItem("deriv_token_1")) {
                window.location.href = "dashboard.html";
            } else {
                // Hide loader after 2 seconds to show login
                setTimeout(() => {
                    document.getElementById("loader-overlay").style.display = "none";
                }, 2000);
            }
        };
    </script>
</body>
</html>
