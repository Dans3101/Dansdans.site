<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dan's Trading Bot</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 400px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 15px;
        }

        p {
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .btn {
            background: #ff444f;
            color: white;
            padding: 15px 25px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            display: inline-block;
            transition: 0.3s ease;
        }

        .btn:hover {
            background: #ff222e;
        }

        .footer {
            margin-top: 40px;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Dan’s Trading Bot</h1>
    <p>Smart. Automated. Profitable.</p>

    <a class="btn" 
       href="https://oauth.deriv.com/oauth2/authorize?app_id=YOUR_APP_ID&redirect_uri=https://dans3101.github.io/Dansdans.site/callback.html">
       Login with Deriv
    </a>

    <div class="footer">
        Secure connection powered by Deriv API
    </div>
</div>

</body>
</html>
