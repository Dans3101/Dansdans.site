<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dans Trading | Secure Login</title>

<style>
:root{
--primary:#1e40af;
--bg:#f3f4f6;
--card:#ffffff;
--success:#10b981;
}
body{
margin:0;
font-family:Segoe UI,Roboto;
background:var(--bg);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.card{
background:var(--card);
padding:40px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.1);
width:350px;
text-align:center;
}
h2{margin-bottom:10px;}
p{color:#6b7280;font-size:0.9rem;}
button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
font-size:15px;
}
.demo{background:#10b981;color:white;}
.real{background:#1e40af;color:white;}
</style>
</head>
<body>

<div class="card">
<h2>Dans Trading Bot</h2>
<p>Login securely to your Deriv account</p>

<button class="demo" onclick="loginDemo()">Login Demo Account</button>
<button class="real" onclick="loginReal()">Login Real Account</button>

</div>

<script>
const APP_ID = 129457;

// If already logged in → go dashboard
if(localStorage.getItem("deriv_token")){
window.location.href="dashboard.html";
}

// OAuth redirect
function loginDemo(){
const redirect = window.location.origin + "/Dansdans.site/index.html?type=demo";
window.location.href=`https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}&redirect_uri=${encodeURIComponent(redirect)}&scope=read,trade`;
}

function loginReal(){
const redirect = window.location.origin + "/Dansdans.site/index.html?type=real";
window.location.href=`https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}&redirect_uri=${encodeURIComponent(redirect)}&scope=read,trade`;
}

// Capture token after OAuth
const params = new URLSearchParams(window.location.search);
const token = params.get("token1");

if(token){
localStorage.setItem("deriv_token", token);

// Clean URL to prevent blinking
window.history.replaceState({}, document.title, "index.html");

window.location.href="dashboard.html";
}
</script>

</body>
</html>
